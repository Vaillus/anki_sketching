<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <title>Anki Sketching</title>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

    <div id="toolbar">
        <h3 style="margin: 0 0 10px 0;">Anki Sketching</h3>
        <div id="anki-status">
            <span id="anki-status-dot"></span>
            <span id="anki-status-label">Vérification…</span>
        </div>
        <form id="import-form">
            <select id="deck-name" name="deck_name" required>
                <option value="" disabled selected>Choisir un paquet</option>
                {% for deck in decks %}
                <option value="{{ deck }}">{{ deck }}</option>
                {% endfor %}
            </select>
            <button type="submit">Importer</button>
        </form>
        <div style="margin-top: 10px;">
            <button id="save-positions" type="button">💾 Sauvegarder positions</button>
            <button id="clear-canvas" type="button" style="margin-left: 10px;">🗑️ Vider le canvas</button>
            <button id="reschedule-distant" type="button" style="margin-left: 10px;">📅 Désapprendre lointaines</button>
        </div>
    </div>

    <div id="zoom-controls">
        <button id="zoom-in">+</button>
        <span id="zoom-level">100%</span>
        <button id="zoom-out">-</button>
        <button id="reset-view">Reset</button>
    </div>

    <div id="canvas-container">
        <div id="canvas">
            <!-- Les cartes seront ajoutées ici -->
        </div>
    </div>

    <div id="info-panel">
        Position: <span id="position">0, 0</span> | Zoom: <span id="zoom-info">100%</span>
    </div>

    <!-- Menu contextuel carte -->
    <div id="context-menu">
        <div class="menu-item" id="context-deselect">Désélectionner</div>
        <div class="menu-item" id="context-delete">Supprimer la carte</div>
        <div class="menu-item" id="context-bring-front">Mettre au premier plan</div>
        <div class="menu-item" id="context-unlearn">Désapprendre</div>
        <div class="menu-item" id="context-min-interval">Intervalle minimum…</div>
        <div class="menu-item" id="context-edit-local" style="display:none;">Modifier</div>
    </div>

    <!-- Menu contextuel canvas -->
    <div id="canvas-context-menu">
        <div class="menu-item" id="canvas-ctx-new-card">Nouvelle carte</div>
    </div>

    <!-- Modal création / édition carte locale -->
    <div id="local-card-modal">
        <div id="local-card-panel">
            <h3 id="local-card-modal-title">Nouvelle carte</h3>
            <label>Recto</label>
            <textarea id="local-card-front" rows="3" placeholder="Texte du recto…"></textarea>
            <label>Verso</label>
            <textarea id="local-card-back" rows="3" placeholder="Texte du verso…"></textarea>
            <label>Image (optionnelle)</label>
            <div id="local-card-paste-zone">
                <span>Coller (Ctrl+V), glisser ou cliquer</span>
            </div>
            <input type="file" id="local-card-image" accept="image/*" style="display:none;">
            <div id="local-card-image-preview"></div>
            <button type="button" id="local-card-remove-image" style="display:none;">Retirer l'image</button>
            <div class="local-card-actions">
                <button id="local-card-submit">Créer</button>
                <button id="local-card-cancel">Annuler</button>
                <button id="local-card-delete" style="display:none;">Supprimer</button>
            </div>
        </div>
    </div>

    <!-- Barre des cartes à réviser -->
    <div id="due-cards-bar">
        <div id="due-cards-header">
            <span id="due-cards-title">À réviser</span>
            <span id="due-cards-count"></span>
            <button id="due-cards-refresh" type="button" title="Rafraîchir">↺</button>
        </div>
        <div id="due-cards-list"></div>
    </div>

    <!-- Barre d'outils de sélection -->
    <div id="selection-toolbar">
        <span id="selection-count">0 carte(s) sélectionnée(s)</span>
        <button id="group-selected">🔗 Grouper</button>
        <button id="deselect-all">❌ Tout désélectionner</button>
    </div>

    <!-- JavaScript modules -->
    <script src="/static/js/globals.js"></script>
    <script src="/static/js/resize.js"></script>
    <script src="/static/js/canvas.js"></script>
    <script src="/static/js/selection.js"></script>
    <script src="/static/js/arrows.js"></script>
    <script src="/static/js/groups.js"></script>
    <script src="/static/js/physics.js"></script>
    <script src="/static/js/storage.js?v=20260218"></script>
    <script src="/static/js/cards.js"></script>
    <script src="/static/js/local_cards.js"></script>
    <script src="/static/js/bootstrap.js"></script>
    <script src="/static/js/due_cards.js"></script>
    <script src="/static/js/anki_status.js"></script>
    <script src="/static/js/reviewer.js"></script>

</body>
</html>
